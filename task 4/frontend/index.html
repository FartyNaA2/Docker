<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-blue-400 text-center">🚀 Task Tracker</h1>

        <div id="tasks-list" class="space-y-4">
            <div class="animate-pulse flex space-x-4">Завантаження...</div>
        </div>
    </div>

    <script>
        async function fetchTasks() {
            try {
                // Робимо запит до нашого API сервера
                const response = await fetch('http://localhost:5000/tasks');
                const tasks = await response.json();
                const list = document.getElementById('tasks-list');
                list.innerHTML = '';

                if (tasks.length === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-center">Завдань поки немає. Додай їх через базу!</p>';
                    return;
                }

                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800 p-5 rounded-xl border border-slate-700 hover:border-blue-500 transition-all';
                    card.innerHTML = `
                        <h3 class="text-xl font-semibold text-blue-300">${task.title}</h3>
                        <p class="text-slate-400 mt-2">${task.description}</p>
                        <div class="mt-4 flex items-center text-xs text-slate-500">
                            <span class="bg-blue-900 text-blue-200 px-2 py-1 rounded">Виконано ✅</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tasks-list').innerHTML = '<p class="text-red-400 text-center">Помилка підключення до API ❌</p>';
            }
        }
        fetchTasks();
    </script>
</body>
</html>
