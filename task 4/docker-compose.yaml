services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:80" # Сайт буде на порту 8080
    depends_on:
      - api